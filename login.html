<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Authentication - Login & Register</title>
    <!-- Tailwind CSS CDN for core spacing and layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for beautiful node symbols -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="w-full h-screen flex flex-col items-center justify-center bg-black select-none relative text-white">

    <!-- Background Orbital Decorative Rings -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden">
        <div class="absolute w-[700px] h-[700px] rounded-full border border-white/10 border-dashed animate-[spin_180s_linear_infinite]"></div>
        <div class="absolute w-[500px] h-[500px] rounded-full border border-purple-500/20"></div>
    </div>

    <!-- Main Authentication Glass Card -->
    <div class="relative z-10 w-full max-w-md p-8 bg-black/85 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl shadow-purple-500/20 flex flex-col items-center max-h-[95vh] overflow-y-auto">
        
        <h1 class="text-lg font-extrabold tracking-wider uppercase text-white mb-4">Orbital Access Portal</h1>

        <!-- Tab Switcher -->
        <div class="grid grid-cols-2 gap-1 bg-white/5 p-1 rounded-xl border border-white/10 w-full mb-6">
            <button type="button" id="tabLogin" onclick="switchTab('login')" class="py-2 text-xs font-bold uppercase rounded-lg bg-white/20 text-white w-full">Log In</button>
            <button type="button" id="tabRegister" onclick="switchTab('register')" class="py-2 text-xs font-bold uppercase rounded-lg text-white/50 w-full">Create Account</button>
        </div>

        <!-- LOG IN FORM -->
        <form id="loginForm" class="w-full space-y-4" onsubmit="handleLogin(event)">
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1.5">Unique User ID</label>
                <input type="text" id="loginId" required placeholder="e.g. ORBIT-9X4B-2026" class="w-full bg-white/5 border border-white/15 text-white rounded-xl px-4 py-2.5 text-xs font-mono uppercase focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1.5">Security PIN / Password</label>
                <input type="password" id="loginPin" required placeholder="••••••••" class="w-full bg-white/5 border border-white/15 text-white rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 to-teal-500 text-white font-extrabold text-xs tracking-widest uppercase rounded-xl mt-2">Launch Into Orbit</button>
        </form>

        <!-- CREATE ACCOUNT FORM -->
        <form id="registerForm" class="w-full space-y-3 hidden" onsubmit="handleRegister(event)">
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">Operator Alias / Name</label>
                <input type="text" id="regName" required placeholder="e.g. Commander Rakib" class="w-full bg-white/5 border border-white/15 text-white rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70">Generate Unique ID</label>
                    <button type="button" onclick="generateUniqueId()" class="text-[10px] text-purple-400 font-mono">Generate New ID</button>
                </div>
                <input type="text" id="regId" required readonly placeholder="Click Generate New ID ->" class="w-full bg-purple-950/20 border border-purple-500/40 text-purple-300 font-mono font-bold rounded-xl px-4 py-2 text-xs uppercase cursor-not-allowed">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">Create Security PIN / Password</label>
                <input type="password" id="regPin" required placeholder="Create strong PIN..." minlength="4" class="w-full bg-white/5 border border-white/15 text-white rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">Confirm Security PIN</label>
                <input type="password" id="regPinConfirm" required placeholder="Repeat PIN..." minlength="4" class="w-full bg-white/5 border border-white/15 text-white rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full py-3 bg-gradient-to-r from-teal-500 to-purple-600 text-white font-extrabold text-xs tracking-widest uppercase rounded-xl mt-3">Register & Initialize Orbit</button>
        </form>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300 bg-purple-950 border border-purple-500 text-white px-5 py-3 rounded-xl text-xs font-mono">
        <span id="toastMsg"></span>
    </div>

    <script>
        const SUPABASE_URL = "https://ixsbbfdtpltekwcbqjep.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_vyQtyp2OiIFom6vhAflXrg_f_LO7Z1I";

        lucide.createIcons();

        function switchTab(mode) {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (mode === 'login') {
                tabLogin.className = "py-2 text-xs font-bold uppercase rounded-lg bg-white/20 text-white w-full";
                tabRegister.className = "py-2 text-xs font-bold uppercase rounded-lg text-white/50 w-full";
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                tabRegister.className = "py-2 text-xs font-bold uppercase rounded-lg bg-white/20 text-white w-full";
                tabLogin.className = "py-2 text-xs font-bold uppercase rounded-lg text-white/50 w-full";
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                if (!document.getElementById('regId').value) generateUniqueId();
            }
        }

        function generateUniqueId() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let segment1 = '', segment2 = '';
            for (let i = 0; i < 4; i++) {
                segment1 += chars.charAt(Math.floor(Math.random() * chars.length));
                segment2 += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            const newId = `ORBIT-${segment1}-${segment2}`;
            document.getElementById('regId').value = newId;
        }

        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const user_id = document.getElementById('regId').value.trim().toUpperCase();
            const pin = document.getElementById('regPin').value.trim();
            const pinConfirm = document.getElementById('regPinConfirm').value.trim();

            if (pin !== pinConfirm) {
                showToast("Error: Security PINs do not match!");
                return;
            }

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ user_id, name, pin })
                });

                if (response.ok) {
                    localStorage.setItem('activeOrbitalUser', user_id);
                    showToast("Account Created Successfully! Launching...");
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    showToast("Error creating account. Try again.");
                }
            } catch (error) {
                showToast("Connection Error!");
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const user_id = document.getElementById('loginId').value.trim().toUpperCase();
            const pin = document.getElementById('loginPin').value.trim();

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users?user_id=eq.${user_id}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await response.json();

                if (data && data.length > 0) {
                    if (data[0].pin === pin) {
                        localStorage.setItem('activeOrbitalUser', user_id);
                        showToast("Authentication Successful!");
                        setTimeout(() => window.location.href = 'index.html', 800);
                    } else {
                        showToast("Access Denied: Incorrect Security PIN.");
                    }
                } else {
                    showToast("User ID not found in registry.");
                }
            } catch (error) {
                showToast("Login Connection Error!");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
