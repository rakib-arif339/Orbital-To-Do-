<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Authentication - Login & Register</title>
    <!-- Tailwind CSS CDN for core spacing and layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for beautiful node symbols -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Base Cyberpunk/Dark Minimal Theme */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* 3D Perspective Orbit Base */
        .orbit-container {
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        /* Core Glowing Pulsing Center Node */
        .center-orb {
            background: linear-gradient(135deg, #a855f7, #3b82f6, #14b8a6);
        }

        /* Custom animation for background rings */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(1.05); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 4s infinite ease-in-out;
        }

        /* Hide Scrollbars completely */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="w-full h-screen flex flex-col items-center justify-center bg-black select-none relative">

    <!-- Background Orbital Decorative Rings -->
    <div class="absolute inset-0 flex items-center justify-center pointer-events-none overflow-hidden">
        <div class="absolute w-[700px] h-[700px] rounded-full border border-white/10 border-dashed animate-[spin_180s_linear_infinite]"></div>
        <div class="absolute w-[500px] h-[500px] rounded-full border border-purple-500/20 animate-pulse-glow"></div>
        <div class="absolute w-[350px] h-[350px] rounded-full border border-white/10 border-dashed animate-[spin_100s_linear_reverse_infinite]"></div>
        <div class="absolute w-[200px] h-[200px] rounded-full border border-teal-500/20 animate-pulse-glow" style="animation-delay: 1s;"></div>
    </div>

    <!-- Main Authentication Glass Card -->
    <div class="relative z-10 w-full max-w-md p-8 bg-black/85 backdrop-blur-2xl border border-white/20 rounded-3xl shadow-2xl shadow-purple-500/20 flex flex-col items-center max-h-[95vh] overflow-y-auto">
        
        <!-- Header Logo / Icon -->
        <div class="w-14 h-14 rounded-full center-orb flex items-center justify-center mb-4 shadow-lg shadow-purple-500/40 relative group">
            <div class="absolute -inset-1 rounded-full bg-gradient-to-r from-purple-600 to-teal-400 opacity-50 blur group-hover:opacity-100 transition duration-500"></div>
            <div class="relative w-12 h-12 rounded-full bg-black flex items-center justify-center text-white">
                <i data-lucide="shield-check" class="w-6 h-6 text-purple-400"></i>
            </div>
        </div>

        <!-- Title -->
        <h1 class="text-lg font-extrabold tracking-wider uppercase text-white mb-4 flex items-center gap-2">
            Orbital Access Portal
        </h1>

        <!-- NEW: Tab Switcher (Log In vs Create Account) -->
        <div class="grid grid-cols-2 gap-1 bg-white/5 p-1 rounded-xl border border-white/10 w-full mb-6">
            <button type="button" id="tabLogin" onclick="switchTab('login')" class="py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all bg-white/20 text-white shadow-md shadow-white/5 flex items-center justify-center gap-1.5">
                <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Log In
            </button>
            <button type="button" id="tabRegister" onclick="switchTab('register')" class="py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all text-white/50 hover:text-white hover:bg-white/10 flex items-center justify-center gap-1.5">
                <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Create Account
            </button>
        </div>

        <!-- ================= LOG IN FORM ================= -->
        <form id="loginForm" class="w-full space-y-4" onsubmit="handleLogin(event)">
            <div>
                <label for="loginId" class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1.5">
                    Unique User ID
                </label>
                <div class="relative flex items-center">
                    <i data-lucide="user" class="w-4 h-4 text-white/40 absolute left-3.5 pointer-events-none"></i>
                    <input type="text" id="loginId" required placeholder="e.g. ORBIT-9X4B-2026" 
                        class="w-full bg-white/5 border border-white/15 text-white font-mono rounded-xl pl-10 pr-4 py-2.5 text-xs focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all placeholder:text-white/20 uppercase">
                </div>
            </div>

            <div>
                <label for="loginPin" class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1.5">
                    Security PIN / Password
                </label>
                <div class="relative flex items-center">
                    <i data-lucide="key" class="w-4 h-4 text-white/40 absolute left-3.5 pointer-events-none"></i>
                    <input type="password" id="loginPin" required placeholder="••••••••" 
                        class="w-full bg-white/5 border border-white/15 text-white rounded-xl pl-10 pr-4 py-2.5 text-xs focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all placeholder:text-white/20">
                </div>
            </div>

            <div class="flex items-center justify-between pt-1 pb-1">
                <label class="flex items-center gap-2 cursor-pointer text-xs text-white/60 hover:text-white transition-colors">
                    <input type="checkbox" checked class="rounded bg-white/10 border-white/20 text-purple-500 focus:ring-0 focus:ring-offset-0 w-3.5 h-3.5 cursor-pointer">
                    <span class="text-[11px]">Keep system synchronized</span>
                </label>
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 via-blue-600 to-teal-500 text-white font-extrabold text-xs tracking-widest uppercase rounded-xl shadow-lg shadow-purple-500/30 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2">
                <span>Launch Into Orbit</span>
                <i data-lucide="rocket" class="w-4 h-4"></i>
            </button>
        </form>

        <!-- ================= CREATE ACCOUNT FORM (Hidden by default) ================= -->
        <form id="registerForm" class="w-full space-y-3 hidden" onsubmit="handleRegister(event)">
            <div>
                <label for="regName" class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">
                    Operator Alias / Name
                </label>
                <div class="relative flex items-center">
                    <i data-lucide="badge-check" class="w-4 h-4 text-white/40 absolute left-3.5 pointer-events-none"></i>
                    <input type="text" id="regName" required placeholder="e.g. Commander Rakib" 
                        class="w-full bg-white/5 border border-white/15 text-white rounded-xl pl-10 pr-4 py-2 text-xs focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all placeholder:text-white/20">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="regId" class="block text-[10px] uppercase tracking-widest font-bold text-white/70">
                        Generate Unique ID
                    </label>
                    <button type="button" onclick="generateUniqueId()" class="text-[10px] text-purple-400 hover:text-purple-300 font-mono flex items-center gap-1 transition-colors">
                        <i data-lucide="sparkles" class="w-3 h-3"></i> Generate New ID
                    </button>
                </div>
                <div class="relative flex items-center">
                    <i data-lucide="fingerprint" class="w-4 h-4 text-purple-400 absolute left-3.5 pointer-events-none"></i>
                    <input type="text" id="regId" required readonly placeholder="Click Generate New ID ->" 
                        class="w-full bg-purple-950/20 border border-purple-500/40 text-purple-300 font-mono font-bold rounded-xl pl-10 pr-4 py-2 text-xs focus:outline-none transition-all placeholder:text-white/20 uppercase cursor-not-allowed">
                </div>
            </div>

            <div>
                <label for="regPin" class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">
                    Create Security PIN / Password
                </label>
                <div class="relative flex items-center">
                    <i data-lucide="lock" class="w-4 h-4 text-white/40 absolute left-3.5 pointer-events-none"></i>
                    <input type="password" id="regPin" required placeholder="Create strong PIN..." minlength="4"
                        class="w-full bg-white/5 border border-white/15 text-white rounded-xl pl-10 pr-4 py-2 text-xs focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all placeholder:text-white/20">
                </div>
            </div>

            <div>
                <label for="regPinConfirm" class="block text-[10px] uppercase tracking-widest font-bold text-white/70 mb-1">
                    Confirm Security PIN
                </label>
                <div class="relative flex items-center">
                    <i data-lucide="check-square" class="w-4 h-4 text-white/40 absolute left-3.5 pointer-events-none"></i>
                    <input type="password" id="regPinConfirm" required placeholder="Repeat PIN..." minlength="4"
                        class="w-full bg-white/5 border border-white/15 text-white rounded-xl pl-10 pr-4 py-2 text-xs focus:outline-none focus:border-purple-500 focus:bg-white/10 transition-all placeholder:text-white/20">
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-gradient-to-r from-teal-500 via-blue-600 to-purple-600 text-white font-extrabold text-xs tracking-widest uppercase rounded-xl shadow-lg shadow-teal-500/30 hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-3">
                <span>Register & Initialize Orbit</span>
                <i data-lucide="orbit" class="w-4 h-4"></i>
            </button>
        </form>

        <!-- Footer System Status -->
        <div class="mt-6 pt-3 border-t border-white/10 w-full flex items-center justify-between text-[10px] font-mono text-white/40">
            <span class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span> Engine: Online
            </span>
            <span>Ver. 2.1.0</span>
        </div>

    </div>

    <!-- Notification Toast (Hidden by default) -->
    <div id="toast" class="fixed bottom-6 z-50 transform translate-y-20 opacity-0 transition-all duration-300 bg-purple-950/95 border border-purple-500/60 text-white px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-xs font-mono">
        <i data-lucide="check-circle-2" class="w-4 h-4 text-teal-400 shrink-0"></i>
        <span id="toastMsg">Notification message.</span>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Check for last logged in user to pre-fill login box
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('activeOrbitalUser');
            if (savedUser) {
                document.getElementById('loginId').value = savedUser;
            }
            // Ensure local users database exists
            if (!localStorage.getItem('orbital_users_db')) {
                localStorage.setItem('orbital_users_db', JSON.stringify({}));
            }
        });

        // --- NEW: Switch Between Login and Create Account Tabs ---
        function switchTab(mode) {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            if (mode === 'login') {
                tabLogin.className = "py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all bg-white/20 text-white shadow-md shadow-white/5 flex items-center justify-center gap-1.5";
                tabRegister.className = "py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all text-white/50 hover:text-white hover:bg-white/10 flex items-center justify-center gap-1.5";
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                tabRegister.className = "py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all bg-white/20 text-white shadow-md shadow-white/5 flex items-center justify-center gap-1.5";
                tabLogin.className = "py-2 text-xs font-bold tracking-wider uppercase rounded-lg transition-all text-white/50 hover:text-white hover:bg-white/10 flex items-center justify-center gap-1.5";
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                // Auto generate ID if empty when switching to Register
                if (!document.getElementById('regId').value) {
                    generateUniqueId();
                }
            }
        }

        // Generate a random high-tech Unique ID for registration
        function generateUniqueId() {
            const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let randomSegment1 = '';
            let randomSegment2 = '';
            
            for (let i = 0; i < 4; i++) {
                randomSegment1 += chars.charAt(Math.floor(Math.random() * chars.length));
                randomSegment2 += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            const newId = `ORBIT-${randomSegment1}-${randomSegment2}`;
            document.getElementById('regId').value = newId;
            showToast(`New ID Generated: ${newId}`);
        }

        // --- Handle Login Submission ---
        function handleLogin(event) {
            event.preventDefault();
            
            const userId = document.getElementById('loginId').value.trim().toUpperCase();
            const userPin = document.getElementById('loginPin').value.trim();
            
            if (!userId || !userPin) {
                showToast("Error: Please provide both ID and PIN.");
                return;
            }

            // Verify against local database
            const usersDb = JSON.parse(localStorage.getItem('orbital_users_db') || '{}');
            
            // If user exists in DB, verify PIN
            if (usersDb[userId]) {
                if (usersDb[userId].pin !== userPin) {
                    showToast("Access Denied: Incorrect Security PIN.");
                    return;
                }
            } else {
                // Optional: If ID not found in DB, let them know or auto-register them
                showToast("Warning: ID not found in local registry, but proceeding as Guest.");
            }

            // Save active session
            localStorage.setItem('activeOrbitalUser', userId);
            showToast("Authentication Successful. Launching Orbit...");

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }

        // --- Handle Create Account Submission ---
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const newId = document.getElementById('regId').value.trim().toUpperCase();
            const pin = document.getElementById('regPin').value.trim();
            const pinConfirm = document.getElementById('regPinConfirm').value.trim();

            if (!newId) {
                showToast("Error: Please click 'Generate New ID' first.");
                return;
            }

            if (pin !== pinConfirm) {
                showToast("Error: Security PINs do not match!");
                return;
            }

            // Save new account into local database
            const usersDb = JSON.parse(localStorage.getItem('orbital_users_db') || '{}');
            
            if (usersDb[newId]) {
                showToast("Error: This ID is already registered. Generate a new one.");
                return;
            }

            usersDb[newId] = {
                name: name,
                pin: pin,
                createdAt: new Date().toISOString()
            };

            localStorage.setItem('orbital_users_db', JSON.stringify(usersDb));
            localStorage.setItem('activeOrbitalUser', newId);

            showToast(`Account Created for ${name}! Launching...`);

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Helper: Show brief bottom notification toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
